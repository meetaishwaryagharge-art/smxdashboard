<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | REFINICS Consultants LLP</title>
<link rel="icon" type="image/jpeg" href="refinics fevicon.jpeg">
<!-- Bootstrap 5.3 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Google Font (Poppins) -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
    background: linear-gradient(135deg, #0d3b66 0%, #044d96 100%);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    border-top: 6px solid #044d96;
    overflow: hidden;
    width: 100%;
    max-width: 440px;
}

.logo-container {
    text-align: center;
    padding: 30px 20px 10px;
}

.logo-container img {
    height: 75px;
    width: auto;
}

.btn-theme {
    background: #044d96;
    color: white;
    border: none;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-theme:hover {
    background: #03366b;
    color: white;
}

.form-control {
    padding: 12px 15px;
    border-radius: 8px;
    background-color: #f8f9fa;
    border: 1px solid #e9ecef;
}

.form-control:focus {
    box-shadow: none;
    border-color: #044d96;
}
</style>
</head>
<body>

<div class="login-card p-4">
    <div class="logo-container">
        <img src="Refinics Logo.webp" alt="Refinics Logo" onerror="this.src='https://via.placeholder.com/200x80?text=REFINICS+LLP'">
        <h4 class="fw-bold mt-3 text-dark">Admin Portal</h4>
        <p class="text-muted small">Enter your operational credentials</p>
    </div>

    <div id="loginAlert" class="alert alert-danger d-none py-2 fs-6 text-center" role="alert">
        Invalid Email or Password!
    </div>

    <form id="adminLoginForm">
        <div class="mb-3">
            <label class="form-label fw-medium text-dark">Email Address</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                <input type="email" id="adminEmail" class="form-control" placeholder="admin@refinics.com" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-medium text-dark">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-theme w-100 py-2.5 rounded-3 mb-2">Login to Dashboard</button>
    </form>

    <div class="text-center mt-3">
        <a href="index.html" class="text-decoration-none small text-muted"><i class="bi bi-arrow-left"></i> Back to Website</a>
    </div>
</div>

<script>
    // Demo Credentials Setup
    const DEFAULT_EMAIL = "admin@refinics.com";
    const DEFAULT_PASS = "admin123";

    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('adminEmail').value.trim();
        const pass = document.getElementById('adminPassword').value.trim();
        const alertBox = document.getElementById('loginAlert');

        if (email === DEFAULT_EMAIL && pass === DEFAULT_PASS) {
            localStorage.setItem('refinics_admin_logged_in', 'true');
            localStorage.setItem('refinics_admin_user', email);
            window.location.href = 'admin.html';
        } else {
            alertBox.classList.remove('d-none');
        }
    });
</script>

</body>
</html>
